<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Debut Trainer</title>

  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: #16213e;
      padding: 14px 24px;
      border-bottom: 2px solid #0f3460;
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #e2b96f;
      letter-spacing: 1px;
    }
    #debut-name {
      font-size: 1rem;
      font-weight: 400;
      color: #aac4e2;
      margin-left: 10px;
      opacity: 0.9;
    }

    /* ── Индикатор режима оценки (A — простая / B — Stockfish) ─────────── */
    .eval-mode {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      background: rgba(15, 52, 96, 0.5);
      color: #aac4e2;
      border: 1px solid #0f3460;
      transition: background 0.2s, border-color 0.2s;
    }
    .eval-mode .badge {
      display: inline-block;
      width: 22px;
      height: 22px;
      line-height: 20px;
      text-align: center;
      border-radius: 50%;
      font-weight: 700;
      font-size: 0.78rem;
      color: #fff;
      background: #888;
      transition: background 0.2s;
    }
    .eval-mode.mode-a   { border-color: #555; }
    .eval-mode.mode-a   .badge { background: #777; }
    .eval-mode.mode-b   { border-color: #2e7d3e; background: rgba(46, 125, 62, 0.18); }
    .eval-mode.mode-b   .badge { background: #2e7d3e; }
    .eval-mode.mode-failed { border-color: #c47a2e; background: rgba(196, 122, 46, 0.18); }
    .eval-mode.mode-failed .badge { background: #c47a2e; }
    .eval-mode .text { letter-spacing: 0.3px; }

    main {
      padding: 20px 24px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .controls button {
      width: 44px;
      height: 44px;
      padding: 0;
      border: 1px solid #0f3460;
      background: #16213e;
      color: #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .controls button img {
      width: 24px;
      height: 24px;
      display: block;
      pointer-events: none;
    }
    .controls button:hover { background: #0f3460; }
    .controls button:active { transform: scale(0.95); }

    /* ── Modal со списком дебютов ─────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      width: min(420px, 92vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .modal-header {
      padding: 14px 18px;
      background: #0f3460;
      color: #e2b96f;
      font-weight: 600;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-close {
      background: transparent;
      border: none;
      color: #e2b96f;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
    }
    .modal-close:hover { color: #fff; }
    .debut-list {
      list-style: none;
      overflow-y: auto;
      padding: 6px 0;
    }
    .debut-list li {
      padding: 12px 18px;
      cursor: pointer;
      color: #e0e0e0;
      border-bottom: 1px solid rgba(15, 52, 96, 0.5);
      transition: background 0.15s, color 0.15s;
    }
    .debut-list li:last-child { border-bottom: none; }
    .debut-list li:hover { background: #0f3460; color: #e2b96f; }
    .debut-list .empty {
      padding: 18px;
      color: #888;
      cursor: default;
      text-align: center;
    }
    .debut-list .empty:hover { background: transparent; color: #888; }

    .board-area {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .board-and-eval {
      display: flex;
      gap: 6px;
      align-items: stretch;
      flex-shrink: 0;
    }

    #board { width: 480px; flex-shrink: 0; }

    /* ── Полоска оценки позиции слева от доски ───────────────────────────── */
    .eval-bar {
      width: 22px;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
      align-self: stretch;
    }
    .eval-bar-fill {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 50%;
      background: #f0f0f0;
      transition: height 0.35s ease;
    }
    .eval-bar.flipped .eval-bar-fill {
      bottom: auto;
      top: 0;
    }
    .eval-value {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.62rem;
      font-weight: 700;
      font-family: 'Consolas', monospace;
      letter-spacing: -0.5px;
      z-index: 2;
      pointer-events: none;
      white-space: nowrap;
    }
    .eval-value.bottom { bottom: 3px; color: #1a1a2e; }
    .eval-value.top    { top: 3px;    color: #f0f0f0; }

    .side-panel {
      flex: 1;
      min-width: 200px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .side-panel-header {
      padding: 10px 14px;
      background: #0f3460;
      font-size: 0.85rem;
      font-weight: 600;
      color: #e2b96f;
      letter-spacing: 0.5px;
    }

    #move-list-container {
      flex: 1;
      overflow-y: auto;
      max-height: 380px;
      padding: 8px 0;
    }

    .move-row {
      display: grid;
      grid-template-columns: 32px 1fr 1fr;
      align-items: center;
      padding: 2px 10px;
      border-radius: 4px;
      margin: 1px 4px;
    }
    .move-num { font-size: 0.78rem; color: #888; }
    .move {
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: 'Consolas', monospace;
      transition: background 0.1s;
    }
    .move:hover { background: #0f3460; color: #e2b96f; }
    .move.active-move { background: #e2b96f; color: #1a1a2e; font-weight: 600; }

    .nav-buttons {
      display: flex;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid #0f3460;
    }
    .nav-buttons button {
      flex: 1;
      height: 38px;
      padding: 0;
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .nav-buttons button img {
      width: 22px;
      height: 22px;
      display: block;
      pointer-events: none;
    }
    .nav-buttons button:hover { background: #0f3460; }
    .nav-buttons button:active { transform: scale(0.95); }

    @media (max-width: 700px) {
      .board-area { flex-direction: column; }
      .board-and-eval { width: 100%; }
      #board { width: calc(100% - 28px); }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Chess Debut Trainer<span id="debut-name"></span></h1>
      <div class="eval-mode mode-a" id="eval-mode" title="Какой движок оценки активен">
        <span class="badge" id="eval-mode-badge">A</span>
        <span class="text" id="eval-mode-text">простая (загрузка Stockfish…)</span>
      </div>
    </div>
  </header>

  <main>
    <div class="controls">
      <button id="btn-flip"     title="Повернуть"><img src="img/icons/flip.png"      alt=""></button>
      <button id="btn-undo"     title="Отменить"><img  src="img/icons/undo.png"      alt=""></button>
      <button id="btn-redo"     title="Повторить"><img src="img/icons/redo.png"      alt=""></button>
      <button id="btn-clear"    title="Очистить"><img  src="img/icons/clear.png"     alt=""></button>
      <button id="btn-save-pgn" title="Save PGN"><img  src="img/icons/save.png"      alt=""></button>
      <button id="btn-load-pgn" title="Load PGN"><img  src="img/icons/load.png"      alt=""></button>
      <button id="btn-home"     title="Сохранённые дебюты"><img src="img/icons/home.png" alt=""></button>
      <input type="file" id="pgn-file-input" accept=".pgn" style="display:none">
      <input type="file" id="sd-file-input"  accept=".json,application/json" style="display:none">
    </div>

    <!-- Модальное окно со списком сохранённых дебютов из sd.json -->
    <div class="modal-overlay" id="debut-modal">
      <div class="modal">
        <div class="modal-header">
          <span>Сохранённые дебюты</span>
          <button class="modal-close" id="btn-modal-close" title="Закрыть">×</button>
        </div>
        <ul class="debut-list" id="debut-list"></ul>
      </div>
    </div>

    <div class="board-area">
      <div class="board-and-eval">
        <div class="eval-bar" id="eval-bar">
          <div class="eval-bar-fill" id="eval-bar-fill"></div>
          <div class="eval-value bottom" id="eval-value">0.0</div>
        </div>
        <div id="board"></div>
      </div>

      <div class="side-panel">
        <div class="side-panel-header">
          <span id="turn-indicator">Ход белых</span>
        </div>
        <div id="move-list-container">
          <div id="move-list"></div>
        </div>
        <div class="nav-buttons">
          <button id="btn-start"     title="В начало"><img src="img/icons/start.png"     alt=""></button>
          <button id="btn-step-back" title="Шаг назад  [←]"><img src="img/icons/step-back.png" alt=""></button>
          <button id="btn-step-fwd"  title="Шаг вперёд [→]"><img src="img/icons/step-fwd.png"  alt=""></button>
          <button id="btn-end"       title="В конец"><img src="img/icons/end.png"       alt=""></button>
        </div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

  <script>
    // ── localStorage helpers ──────────────────────────────────────────────────
    const LS_KEY      = 'chess_debut_moves';
    const LS_NAME_KEY = 'chess_debut_name';

    function loadMoves() {
      const data = localStorage.getItem(LS_KEY);
      return data ? JSON.parse(data) : [];
    }

    function saveMoves(movesArray) {
      localStorage.setItem(LS_KEY, JSON.stringify(movesArray));
    }

    function appendMove(moveObj) {
      const moves = loadMoves();
      moves.push(moveObj);
      saveMoves(moves);
    }

    function deleteMovesFrom(index) {
      const moves = loadMoves();
      saveMoves(moves.slice(0, index));
    }

    function clearAllMoves() {
      localStorage.removeItem(LS_KEY);
      localStorage.removeItem(LS_NAME_KEY);
    }

    function saveDebutName(name) {
      if (name) {
        localStorage.setItem(LS_NAME_KEY, name);
      } else {
        localStorage.removeItem(LS_NAME_KEY);
      }
    }

    function loadDebutName() {
      return localStorage.getItem(LS_NAME_KEY) || '';
    }

    function applyDebutName(name) {
      const debutEl = document.getElementById('debut-name');
      debutEl.textContent = name ? ' — ' + name : '';
    }

    // ── State ─────────────────────────────────────────────────────────────────
    let board            = null;
    let game             = null;
    let savedMoves       = [];
    let currentIdx       = -1;
    let isReviewing      = false;
    let currentDebutName = '';

    // ── Helpers ───────────────────────────────────────────────────────────────
    function updateTurnIndicator() {
      const el = document.getElementById('turn-indicator');
      if (isReviewing || currentIdx < savedMoves.length - 1) {
        el.textContent = 'Режим просмотра';
        el.style.color = '#aaa';
      } else {
        el.textContent = game.turn() === 'w' ? 'Ход белых' : 'Ход чёрных';
        el.style.color = game.turn() === 'w' ? '#fff' : '#bbb';
      }
      updateEvalBar();
    }

    // ── Position evaluation: material + piece-square tables ──────────────────
    // Все таблицы — с точки зрения белых; индекс 0 = a8, индекс 63 = h1
    // (порядок чтения FEN-доски). Для чёрной фигуры индекс зеркалится: idx ^ 56.
    const PST_PAWN = [
       0,   0,   0,   0,   0,   0,   0,   0,
      50,  50,  50,  50,  50,  50,  50,  50,
      10,  10,  20,  30,  30,  20,  10,  10,
       5,   5,  10,  25,  25,  10,   5,   5,
       0,   0,   0,  20,  20,   0,   0,   0,
       5,  -5, -10,   0,   0, -10,  -5,   5,
       5,  10,  10, -20, -20,  10,  10,   5,
       0,   0,   0,   0,   0,   0,   0,   0
    ];
    const PST_KNIGHT = [
     -50, -40, -30, -30, -30, -30, -40, -50,
     -40, -20,   0,   0,   0,   0, -20, -40,
     -30,   0,  10,  15,  15,  10,   0, -30,
     -30,   5,  15,  20,  20,  15,   5, -30,
     -30,   0,  15,  20,  20,  15,   0, -30,
     -30,   5,  10,  15,  15,  10,   5, -30,
     -40, -20,   0,   5,   5,   0, -20, -40,
     -50, -40, -30, -30, -30, -30, -40, -50
    ];
    const PST_BISHOP = [
     -20, -10, -10, -10, -10, -10, -10, -20,
     -10,   0,   0,   0,   0,   0,   0, -10,
     -10,   0,   5,  10,  10,   5,   0, -10,
     -10,   5,   5,  10,  10,   5,   5, -10,
     -10,   0,  10,  10,  10,  10,   0, -10,
     -10,  10,  10,  10,  10,  10,  10, -10,
     -10,   5,   0,   0,   0,   0,   5, -10,
     -20, -10, -10, -10, -10, -10, -10, -20
    ];
    const PST_ROOK = [
       0,   0,   0,   0,   0,   0,   0,   0,
       5,  10,  10,  10,  10,  10,  10,   5,
      -5,   0,   0,   0,   0,   0,   0,  -5,
      -5,   0,   0,   0,   0,   0,   0,  -5,
      -5,   0,   0,   0,   0,   0,   0,  -5,
      -5,   0,   0,   0,   0,   0,   0,  -5,
      -5,   0,   0,   0,   0,   0,   0,  -5,
       0,   0,   0,   5,   5,   0,   0,   0
    ];
    const PST_QUEEN = [
     -20, -10, -10,  -5,  -5, -10, -10, -20,
     -10,   0,   0,   0,   0,   0,   0, -10,
     -10,   0,   5,   5,   5,   5,   0, -10,
      -5,   0,   5,   5,   5,   5,   0,  -5,
       0,   0,   5,   5,   5,   5,   0,  -5,
     -10,   5,   5,   5,   5,   5,   0, -10,
     -10,   0,   5,   0,   0,   0,   0, -10,
     -20, -10, -10,  -5,  -5, -10, -10, -20
    ];
    const PST_KING = [
     -30, -40, -40, -50, -50, -40, -40, -30,
     -30, -40, -40, -50, -50, -40, -40, -30,
     -30, -40, -40, -50, -50, -40, -40, -30,
     -30, -40, -40, -50, -50, -40, -40, -30,
     -20, -30, -30, -40, -40, -30, -30, -20,
     -10, -20, -20, -20, -20, -20, -20, -10,
      20,  20,   0,   0,   0,   0,  20,  20,
      20,  30,  10,   0,   0,  10,  30,  20
    ];
    const PST       = { p: PST_PAWN, n: PST_KNIGHT, b: PST_BISHOP, r: PST_ROOK, q: PST_QUEEN, k: PST_KING };
    const PIECE_VAL = { p: 100,      n: 320,        b: 330,        r: 500,     q: 900,        k: 0         };

    function evaluatePosition() {
      // Возвращает { score (в пешках, плюс — лучше белым), label, isMate }
      if (game.in_checkmate()) {
        return game.turn() === 'w'
          ? { score: -100, label: '0–1', isMate: true }
          : { score:  100, label: '1–0', isMate: true };
      }
      if (game.in_stalemate() || game.in_threefold_repetition() || game.insufficient_material()) {
        return { score: 0, label: '½–½', isMate: false };
      }

      const fenBoard = game.fen().split(' ')[0];
      const ranks    = fenBoard.split('/');
      let cp = 0;

      for (let r = 0; r < 8; r++) {
        let file = 0;
        for (const ch of ranks[r]) {
          if (ch >= '1' && ch <= '8') {
            file += parseInt(ch, 10);
          } else {
            const isWhite = ch === ch.toUpperCase();
            const piece   = ch.toLowerCase();
            const idx     = r * 8 + file;
            const pstIdx  = isWhite ? idx : (idx ^ 56);
            const val     = PIECE_VAL[piece] || 0;
            const pstVal  = PST[piece] ? PST[piece][pstIdx] : 0;
            cp += isWhite ? (val + pstVal) : -(val + pstVal);
            file++;
          }
        }
      }

      const score = cp / 100;
      const sign  = score > 0 ? '+' : (score < 0 ? '−' : '');
      const label = (Math.abs(score) < 0.05) ? '0.0' : sign + Math.abs(score).toFixed(1);
      return { score, label, isMate: false };
    }

    function renderEvalBar(score, label) {
      const fillEl  = document.getElementById('eval-bar-fill');
      const valueEl = document.getElementById('eval-value');
      const barEl   = document.getElementById('eval-bar');
      if (!fillEl || !valueEl || !barEl) return;

      const clamped  = Math.max(-5, Math.min(5, score));
      const whitePct = 50 + (clamped / 5) * 50;

      const flipped = (board && typeof board.orientation === 'function' && board.orientation() === 'black');
      barEl.classList.toggle('flipped', flipped);
      fillEl.style.height = whitePct + '%';

      valueEl.textContent = label;
      const onWhiteSide = score >= 0;
      const atTop = flipped ? onWhiteSide : !onWhiteSide;
      valueEl.classList.toggle('top', atTop);
      valueEl.classList.toggle('bottom', !atTop);
    }

    function updateEvalBar() {
      // Если Stockfish готов — НЕ трогаем градусник вообще: он остаётся стоять
      // там, где его оставила прошлая полная оценка (depth = ENGINE_DEPTH).
      // Перерисуется только когда движок досчитает до целевой глубины.
      // Слой A (материал + PST) используем только как фоллбэк, пока Stockfish
      // не поднялся или совсем не запустился.
      if (engineReady) {
        requestEngineEval(game.fen());
        return;
      }
      const { score, label } = evaluatePosition();
      renderEvalBar(score, label);
    }

    // ── Stockfish (слой B) ─────────────────────────────────────────────────
    // Подключение: один файл engine/stockfish.asm.js (~957 KB), запускается
    // в Web Worker'е, общение через UCI. Никакого интернета не нужно.
    // Если Worker не стартанёт (политики безопасности браузера на file:// и т.п.)
    // — остаёмся на слое A, индикатор покажет «не запустился».
    let engine          = null;
    let engineReady     = false;
    let engineFailed    = false;
    let isSearching     = false;
    let pendingFen      = null;
    let currentSearchFen = null;
    const ENGINE_DEPTH  = 20;   // глубина поиска
    const ENGINE_PATH   = 'engine/stockfish.asm.js';

    function setEvalMode(mode, text) {
      const el     = document.getElementById('eval-mode');
      const badge  = document.getElementById('eval-mode-badge');
      const txt    = document.getElementById('eval-mode-text');
      if (!el || !badge || !txt) return;
      el.classList.remove('mode-a', 'mode-b', 'mode-failed');
      el.classList.add('mode-' + mode);
      badge.textContent = (mode === 'b') ? 'B' : 'A';
      txt.textContent   = text;
    }

    function initEngine() {
      try {
        engine = new Worker(ENGINE_PATH);
      } catch (err) {
        engineFailed = true;
        setEvalMode('failed', 'простая · Stockfish не запустился');
        console.warn('Stockfish: не удалось создать Worker —', err);
        return;
      }

      engine.onerror = (err) => {
        engineFailed = true;
        engineReady  = false;
        setEvalMode('failed', 'простая · Stockfish не запустился');
        console.warn('Stockfish: ошибка Worker —', err && err.message);
      };

      engine.onmessage = (e) => {
        const line = (typeof e.data === 'string') ? e.data : String(e.data);
        handleEngineLine(line);
      };

      // UCI handshake
      engine.postMessage('uci');
    }

    function handleEngineLine(line) {
      if (line === 'uciok') {
        engine.postMessage('isready');
        return;
      }
      if (line === 'readyok') {
        engineReady = true;
        setEvalMode('b', 'Stockfish · готов');
        requestEngineEval(game.fen());
        return;
      }
      if (line.indexOf('bestmove') === 0) {
        isSearching = false;
        sendNextSearch();
        return;
      }
      if (line.indexOf('info ') === 0 && line.indexOf(' score ') !== -1) {
        parseInfoLine(line);
        return;
      }
    }

    function parseInfoLine(line) {
      const tokens   = line.split(/\s+/);
      const scoreIdx = tokens.indexOf('score');
      if (scoreIdx === -1) return;
      const type = tokens[scoreIdx + 1];
      const val  = parseInt(tokens[scoreIdx + 2], 10);
      if (Number.isNaN(val)) return;
      const depthIdx = tokens.indexOf('depth');
      const depth    = depthIdx >= 0 ? parseInt(tokens[depthIdx + 1], 10) : 0;

      // UCI отдаёт оценку с точки зрения стороны, чей ход. Нормализуем к белым.
      const turnChar = (currentSearchFen || game.fen()).split(' ')[1];
      const sideMul  = (turnChar === 'w') ? 1 : -1;

      let score, label;
      if (type === 'cp') {
        score = (val * sideMul) / 100;
        const sign = score > 0 ? '+' : (score < 0 ? '−' : '');
        label = (Math.abs(score) < 0.05) ? '0.0' : sign + Math.abs(score).toFixed(1);
      } else if (type === 'mate') {
        const m = val * sideMul;
        if (m > 0)      { score =  100; label = '#' + m;     }
        else if (m < 0) { score = -100; label = '−#' + (-m); }
        else            { score = -100 * sideMul; label = sideMul > 0 ? '0–1' : '1–0'; }
      } else {
        return;
      }

      // Перерисовываем градусник ТОЛЬКО когда движок досчитал до целевой глубины.
      // Промежуточные info-строки (depth = 1..ENGINE_DEPTH-1) только обновляют
      // текстовый индикатор «d…», но не двигают полоску — чтобы она не колыхалась.
      if (depth >= ENGINE_DEPTH) {
        renderEvalBar(score, label);
      }
      setEvalMode('b', 'Stockfish · d' + depth);
    }

    function requestEngineEval(fen) {
      if (!engineReady || engineFailed) return;
      pendingFen = fen;
      if (isSearching) {
        engine.postMessage('stop');
      } else {
        sendNextSearch();
      }
    }

    function sendNextSearch() {
      if (!engineReady || pendingFen === null) return;
      const fen = pendingFen;
      pendingFen = null;
      currentSearchFen = fen;
      isSearching = true;
      engine.postMessage('position fen ' + fen);
      engine.postMessage('go depth ' + ENGINE_DEPTH);
    }

    // ── Move list rendering ───────────────────────────────────────────────────
    function renderMoveList() {
      const container = document.getElementById('move-list');
      container.innerHTML = '';

      for (let i = 0; i < savedMoves.length; i += 2) {
        const whiteMove = savedMoves[i];
        const blackMove = savedMoves[i + 1];

        const row = document.createElement('div');
        row.className = 'move-row';

        const numSpan = document.createElement('span');
        numSpan.className = 'move-num';
        numSpan.textContent = whiteMove.move_number + '.';
        row.appendChild(numSpan);

        const whiteSpan = document.createElement('span');
        whiteSpan.className = 'move white';
        whiteSpan.textContent = whiteMove.move_san;
        whiteSpan.dataset.idx = i;
        if (i === currentIdx) whiteSpan.classList.add('active-move');
        whiteSpan.addEventListener('click', () => goToMove(parseInt(whiteSpan.dataset.idx)));
        row.appendChild(whiteSpan);

        const blackSpan = document.createElement('span');
        blackSpan.className = 'move black';
        if (blackMove) {
          blackSpan.textContent = blackMove.move_san;
          blackSpan.dataset.idx = i + 1;
          if (i + 1 === currentIdx) blackSpan.classList.add('active-move');
          blackSpan.addEventListener('click', () => goToMove(parseInt(blackSpan.dataset.idx)));
        }
        row.appendChild(blackSpan);

        container.appendChild(row);
      }

      const active = container.querySelector('.active-move');
      if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    // ── Navigation ────────────────────────────────────────────────────────────
    function goToMove(idx) {
      if (idx < 0 || idx >= savedMoves.length) return;
      currentIdx  = idx;
      isReviewing = true;
      const move  = savedMoves[idx];
      game.load(move.fen_after);
      board.position(move.fen_after, true);
      renderMoveList();
      updateTurnIndicator();
    }

    function goToStart() {
      currentIdx  = -1;
      isReviewing = true;
      game.reset();
      board.start(true);
      renderMoveList();
      updateTurnIndicator();
    }

    function goToEnd() {
      if (savedMoves.length === 0) return;
      currentIdx  = savedMoves.length - 1;
      isReviewing = false;
      const last  = savedMoves[currentIdx];
      game.load(last.fen_after);
      board.position(last.fen_after, true);
      renderMoveList();
      updateTurnIndicator();
    }

    // ── Undo / Redo ───────────────────────────────────────────────────────────
    function undoMove() {
      if (savedMoves.length === 0) return;

      if (!isReviewing && currentIdx === savedMoves.length - 1) {
        // Recording mode — remove last move from localStorage
        savedMoves.pop();
        deleteMovesFrom(savedMoves.length);
        currentIdx = savedMoves.length - 1;

        if (savedMoves.length === 0) {
          game.reset();
          board.start(true);
        } else {
          const prev = savedMoves[currentIdx];
          game.load(prev.fen_after);
          board.position(prev.fen_after, true);
        }
      } else {
        // Review mode — step back
        if (currentIdx <= -1) return;
        currentIdx--;
        isReviewing = true;

        if (currentIdx === -1) {
          game.reset();
          board.start(true);
        } else {
          const move = savedMoves[currentIdx];
          game.load(move.fen_after);
          board.position(move.fen_after, true);
        }
      }

      renderMoveList();
      updateTurnIndicator();
    }

    function redoMove() {
      if (!isReviewing && currentIdx === savedMoves.length - 1) return;
      if (currentIdx >= savedMoves.length - 1) {
        isReviewing = false;
        renderMoveList();
        updateTurnIndicator();
        return;
      }

      currentIdx++;
      const move = savedMoves[currentIdx];
      game.load(move.fen_after);
      board.position(move.fen_after, true);

      if (currentIdx === savedMoves.length - 1) isReviewing = false;

      renderMoveList();
      updateTurnIndicator();
    }

    // ── Step navigation (never deletes moves) ────────────────────────────────
    function stepBack() {
      if (savedMoves.length === 0 || currentIdx === -1) return;
      currentIdx--;
      isReviewing = currentIdx < savedMoves.length - 1;

      if (currentIdx === -1) {
        game.reset();
        board.start(true);
        isReviewing = true;
      } else {
        const move = savedMoves[currentIdx];
        game.load(move.fen_after);
        board.position(move.fen_after, true);
      }

      renderMoveList();
      updateTurnIndicator();
    }

    function stepForward() {
      if (currentIdx >= savedMoves.length - 1) return;
      currentIdx++;
      const move = savedMoves[currentIdx];
      game.load(move.fen_after);
      board.position(move.fen_after, true);
      isReviewing = currentIdx < savedMoves.length - 1;

      renderMoveList();
      updateTurnIndicator();
    }

    // ── chessboard.js callbacks ───────────────────────────────────────────────
    function onDragStart(source, piece) {
      if (isReviewing || currentIdx < savedMoves.length - 1) return false;
      if (game.game_over()) return false;
      if (game.turn() === 'w' && piece.startsWith('b')) return false;
      if (game.turn() === 'b' && piece.startsWith('w')) return false;
      return true;
    }

    function onDrop(source, target) {
      const fenBefore = game.fen();
      const move = game.move({ from: source, to: target, promotion: 'q' });
      if (!move) return 'snapback';

      const fenAfter   = game.fen();
      const moveNumber = Math.ceil((savedMoves.length + 1) / 2);
      const color      = move.color === 'w' ? 'white' : 'black';

      const data = {
        move_number: moveNumber,
        color:       color,
        move_san:    move.san,
        move_uci:    source + target,
        fen_before:  fenBefore,
        fen_after:   fenAfter
      };

      savedMoves.push(data);
      appendMove(data);
      currentIdx = savedMoves.length - 1;

      renderMoveList();
      updateTurnIndicator();
    }

    function onSnapEnd() {
      board.position(game.fen());
    }

    // ── Initialization ────────────────────────────────────────────────────────
    function init() {
      game = new Chess();

      const config = {
        draggable:    true,
        position:     'start',
        showNotation: true,
        pieceTheme:   'img/chesspieces/wikipedia/{piece}.png',
        onDragStart:  onDragStart,
        onDrop:       onDrop,
        onSnapEnd:    onSnapEnd
      };

      board = Chessboard('board', config);

      savedMoves = loadMoves();

      if (savedMoves.length > 0) {
        currentIdx  = savedMoves.length - 1;
        isReviewing = false;
        const last  = savedMoves[currentIdx];
        game.load(last.fen_after);
        board.position(last.fen_after, false);
      }

      // Восстановить название дебюта из localStorage
      applyDebutName(loadDebutName());

      renderMoveList();
      updateTurnIndicator();

      document.getElementById('btn-flip').addEventListener('click', () => board.flip());
      document.getElementById('btn-undo').addEventListener('click', undoMove);
      document.getElementById('btn-redo').addEventListener('click', redoMove);
      document.getElementById('btn-start').addEventListener('click', goToStart);
      document.getElementById('btn-end').addEventListener('click', goToEnd);
      document.getElementById('btn-step-back').addEventListener('click', stepBack);
      document.getElementById('btn-step-fwd').addEventListener('click', stepForward);

      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === 'ArrowLeft')  { e.preventDefault(); stepBack(); }
        if (e.key === 'ArrowRight') { e.preventDefault(); stepForward(); }
      });
      document.getElementById('btn-save-pgn').addEventListener('click', savePGN);

      document.getElementById('btn-load-pgn').addEventListener('click', () => {
        document.getElementById('pgn-file-input').click();
      });

      document.getElementById('pgn-file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        // Имя файла без расширения, декодировать как есть (браузер уже UTF-8)
        const rawName = file.name.replace(/\.pgn$/i, '');
        const reader = new FileReader();
        reader.onload = (ev) => loadPGN(ev.target.result, rawName);
        reader.readAsText(file, 'UTF-8');
        e.target.value = ''; // сброс, чтобы можно было загрузить тот же файл повторно
      });

      // ── Кнопка «домик» — список сохранённых дебютов из sd.json ─────────
      document.getElementById('btn-home').addEventListener('click', openDebutsList);
      document.getElementById('btn-modal-close').addEventListener('click', closeDebutsList);
      document.getElementById('debut-modal').addEventListener('click', (e) => {
        if (e.target.id === 'debut-modal') closeDebutsList();
      });
      document.getElementById('sd-file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        e.target.value = '';
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            renderDebutList(data);
          } catch (err) {
            renderDebutListError('Ошибка чтения sd.json: ' + err.message);
          }
        };
        reader.readAsText(file, 'UTF-8');
      });

      document.getElementById('btn-clear').addEventListener('click', () => {
        if (!confirm('Очистить всю партию?')) return;
        clearAllMoves();
        savedMoves  = [];
        currentIdx  = -1;
        isReviewing = false;
        game.reset();
        board.start(true);
        applyDebutName('');
        renderMoveList();
        updateTurnIndicator();
      });

      // Запускаем Stockfish (слой B). Если не получится — остаёмся на A.
      initEngine();
    }

    // ── PGN Export ────────────────────────────────────────────────────────────
    function buildPGN() {
      const tempGame = new Chess();
      for (const m of savedMoves) {
        tempGame.move(m.move_san);
      }
      return tempGame.pgn();
    }

    function savePGN() {
      if (savedMoves.length === 0) { alert('Партия пуста — нечего сохранять.'); return; }
      const defaultName = currentDebutName || 'game';
      const name = prompt('Введите имя файла:', defaultName);
      if (!name) return;
      const filename = name.endsWith('.pgn') ? name : name + '.pgn';
      currentDebutName = name.replace(/\.pgn$/i, '');
      document.getElementById('debut-name').textContent = ' — ' + currentDebutName;
      const pgn = buildPGN();
      const blob = new Blob([pgn], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);

      // Сохранить и показать имя дебюта (без расширения .pgn)
      const debutName = name.replace(/\.pgn$/i, '');
      saveDebutName(debutName);
      applyDebutName(debutName);
    }

    // ── PGN Import ────────────────────────────────────────────────────────────
    function loadPGN(pgnText, debutName) {
      const tempGame = new Chess();
      const ok = tempGame.load_pgn(pgnText);
      if (!ok) { alert('Ошибка: не удалось разобрать PGN-файл.'); return; }

      // Replay all moves and collect data
      const history = tempGame.history({ verbose: true });
      clearAllMoves();
      savedMoves  = [];
      currentIdx  = -1;
      isReviewing = false;

      const replayGame = new Chess();
      for (const h of history) {
        const fenBefore = replayGame.fen();
        const move = replayGame.move({ from: h.from, to: h.to, promotion: h.promotion || 'q' });
        if (!move) break;
        const fenAfter   = replayGame.fen();
        const moveNumber = Math.ceil((savedMoves.length + 1) / 2);
        const data = {
          move_number: moveNumber,
          color:       move.color === 'w' ? 'white' : 'black',
          move_san:    move.san,
          move_uci:    h.from + h.to,
          fen_before:  fenBefore,
          fen_after:   fenAfter
        };
        savedMoves.push(data);
        appendMove(data);
      }

      if (savedMoves.length > 0) {
        currentIdx = savedMoves.length - 1;
        const last = savedMoves[currentIdx];
        game.load(last.fen_after);
        board.position(last.fen_after, true);
      } else {
        game.reset();
        board.start(true);
      }

      // Сохраняем и показываем имя дебюта в заголовке
      saveDebutName(debutName);
      applyDebutName(debutName);

      renderMoveList();
      updateTurnIndicator();
    }

    // ── Список сохранённых дебютов из sd.json ─────────────────────────────
    function openDebutsList() {
      const modal = document.getElementById('debut-modal');
      modal.classList.add('active');
      const list = document.getElementById('debut-list');
      list.innerHTML = '<li class="empty">Загрузка sd.json…</li>';

      // Пробуем fetch — работает на http(s):// и в большинстве случаев на file:// в Firefox.
      // На file:// в Chrome/Edge fetch заблокирован — тогда откроется диалог выбора файла.
      fetch('sd.json', { cache: 'no-store' })
        .then(resp => {
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          return resp.text();
        })
        .then(text => {
          try {
            const data = JSON.parse(text);
            renderDebutList(data);
          } catch (e) {
            renderDebutListError('sd.json: некорректный JSON — ' + e.message);
          }
        })
        .catch(err => {
          // Fallback: страница открыта как file:// и браузер заблокировал fetch.
          // Просим пользователя выбрать sd.json вручную.
          renderDebutListError(
            'Не удалось автоматически прочитать sd.json (' + err.message + ').<br>' +
            'Выберите файл вручную:'
          );
          const li = document.createElement('li');
          li.style.padding = '8px 18px 14px';
          const btn = document.createElement('button');
          btn.textContent = 'Выбрать sd.json';
          btn.style.cssText =
            'width:100%;padding:10px;border:1px solid #0f3460;background:#1a1a2e;' +
            'color:#e2b96f;border-radius:6px;cursor:pointer;font-size:0.9rem;';
          btn.addEventListener('click', () =>
            document.getElementById('sd-file-input').click()
          );
          li.appendChild(btn);
          li.classList.add('empty');
          li.style.cursor = 'default';
          document.getElementById('debut-list').appendChild(li);
        });
    }

    function closeDebutsList() {
      document.getElementById('debut-modal').classList.remove('active');
    }

    function renderDebutListError(msg) {
      const list = document.getElementById('debut-list');
      list.innerHTML = '';
      const li = document.createElement('li');
      li.className = 'empty';
      li.innerHTML = msg;
      list.appendChild(li);
    }

    function renderDebutList(data) {
      const list = document.getElementById('debut-list');
      list.innerHTML = '';

      const debuts = (data && Array.isArray(data.debuts)) ? data.debuts : [];
      if (debuts.length === 0) {
        renderDebutListError('Список пуст. Добавьте дебюты в sd.json.');
        return;
      }

      // Показываем только названия — без ходов.
      debuts.forEach((d, idx) => {
        const li = document.createElement('li');
        li.textContent = d.name || ('Дебют #' + (idx + 1));
        li.title = 'Загрузить на доску';
        li.addEventListener('click', () => {
          loadDebutFromList(d);
        });
        list.appendChild(li);
      });
    }

    function loadDebutFromList(debut) {
      // Поддерживаем 2 формы записи дебюта в sd.json:
      //   - "pgn":   "1. e4 c5 2. Nf3 ..."   (рекомендованная — удобно править в редакторе)
      //   - "moves": ["e4", "c5", "Nf3", ...] (массив ходов в SAN)
      let pgn = debut.pgn;
      if (!pgn && Array.isArray(debut.moves)) {
        // Преобразуем массив ходов в строку PGN.
        let out = '';
        for (let i = 0; i < debut.moves.length; i++) {
          if (i % 2 === 0) out += (i / 2 + 1) + '. ';
          out += debut.moves[i] + ' ';
        }
        pgn = out.trim();
      }
      if (!pgn) {
        alert('У дебюта «' + (debut.name || '?') + '» нет ходов (поля "pgn" или "moves").');
        return;
      }
      loadPGN(pgn, debut.name || '');
      closeDebutsList();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeDebutsList();
    });

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
