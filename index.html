<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Debut Trainer</title>

  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: #16213e;
      padding: 14px 24px;
      border-bottom: 2px solid #0f3460;
    }
    header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #e2b96f;
      letter-spacing: 1px;
    }
    #debut-name {
      font-size: 1rem;
      font-weight: 400;
      color: #aac4e2;
      margin-left: 10px;
      opacity: 0.9;
    }

    main {
      padding: 20px 24px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .controls button {
      width: 44px;
      height: 44px;
      padding: 0;
      border: 1px solid #0f3460;
      background: #16213e;
      color: #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .controls button img {
      width: 24px;
      height: 24px;
      display: block;
      pointer-events: none;
    }
    .controls button:hover { background: #0f3460; }
    .controls button:active { transform: scale(0.95); }

    /* ── Modal со списком дебютов ─────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      width: min(420px, 92vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .modal-header {
      padding: 14px 18px;
      background: #0f3460;
      color: #e2b96f;
      font-weight: 600;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-close {
      background: transparent;
      border: none;
      color: #e2b96f;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
    }
    .modal-close:hover { color: #fff; }
    .debut-list {
      list-style: none;
      overflow-y: auto;
      padding: 6px 0;
    }
    .debut-list li {
      padding: 12px 18px;
      cursor: pointer;
      color: #e0e0e0;
      border-bottom: 1px solid rgba(15, 52, 96, 0.5);
      transition: background 0.15s, color 0.15s;
    }
    .debut-list li:last-child { border-bottom: none; }
    .debut-list li:hover { background: #0f3460; color: #e2b96f; }
    .debut-list .empty {
      padding: 18px;
      color: #888;
      cursor: default;
      text-align: center;
    }
    .debut-list .empty:hover { background: transparent; color: #888; }

    .board-area {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    #board { width: 480px; flex-shrink: 0; }

    .side-panel {
      flex: 1;
      min-width: 200px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .side-panel-header {
      padding: 10px 14px;
      background: #0f3460;
      font-size: 0.85rem;
      font-weight: 600;
      color: #e2b96f;
      letter-spacing: 0.5px;
    }

    #move-list-container {
      flex: 1;
      overflow-y: auto;
      max-height: 380px;
      padding: 8px 0;
    }

    .move-row {
      display: grid;
      grid-template-columns: 32px 1fr 1fr;
      align-items: center;
      padding: 2px 10px;
      border-radius: 4px;
      margin: 1px 4px;
    }
    .move-num { font-size: 0.78rem; color: #888; }
    .move {
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: 'Consolas', monospace;
      transition: background 0.1s;
    }
    .move:hover { background: #0f3460; color: #e2b96f; }
    .move.active-move { background: #e2b96f; color: #1a1a2e; font-weight: 600; }

    .nav-buttons {
      display: flex;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid #0f3460;
    }
    .nav-buttons button {
      flex: 1;
      height: 38px;
      padding: 0;
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .nav-buttons button img {
      width: 22px;
      height: 22px;
      display: block;
      pointer-events: none;
    }
    .nav-buttons button:hover { background: #0f3460; }
    .nav-buttons button:active { transform: scale(0.95); }

    @media (max-width: 700px) {
      .board-area { flex-direction: column; }
      #board { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Chess Debut Trainer<span id="debut-name"></span></h1>
  </header>

  <main>
    <div class="controls">
      <button id="btn-flip"     title="Повернуть"><img src="img/icons/flip.png"      alt=""></button>
      <button id="btn-undo"     title="Отменить"><img  src="img/icons/undo.png"      alt=""></button>
      <button id="btn-redo"     title="Повторить"><img src="img/icons/redo.png"      alt=""></button>
      <button id="btn-clear"    title="Очистить"><img  src="img/icons/clear.png"     alt=""></button>
      <button id="btn-save-pgn" title="Save PGN"><img  src="img/icons/save.png"      alt=""></button>
      <button id="btn-load-pgn" title="Load PGN"><img  src="img/icons/load.png"      alt=""></button>
      <button id="btn-home"     title="Сохранённые дебюты"><img src="img/icons/home.png" alt=""></button>
      <input type="file" id="pgn-file-input" accept=".pgn" style="display:none">
      <input type="file" id="sd-file-input"  accept=".json,application/json" style="display:none">
    </div>

    <!-- Модальное окно со списком сохранённых дебютов из sd.json -->
    <div class="modal-overlay" id="debut-modal">
      <div class="modal">
        <div class="modal-header">
          <span>Сохранённые дебюты</span>
          <button class="modal-close" id="btn-modal-close" title="Закрыть">×</button>
        </div>
        <ul class="debut-list" id="debut-list"></ul>
      </div>
    </div>

    <div class="board-area">
      <div id="board"></div>

      <div class="side-panel">
        <div class="side-panel-header">
          <span id="turn-indicator">Ход белых</span>
        </div>
        <div id="move-list-container">
          <div id="move-list"></div>
        </div>
        <div class="nav-buttons">
          <button id="btn-start"     title="В начало"><img src="img/icons/start.png"     alt=""></button>
          <button id="btn-step-back" title="Шаг назад  [←]"><img src="img/icons/step-back.png" alt=""></button>
          <button id="btn-step-fwd"  title="Шаг вперёд [→]"><img src="img/icons/step-fwd.png"  alt=""></button>
          <button id="btn-end"       title="В конец"><img src="img/icons/end.png"       alt=""></button>
        </div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

  <script>
    // ── localStorage helpers ──────────────────────────────────────────────────
    const LS_KEY      = 'chess_debut_moves';
    const LS_NAME_KEY = 'chess_debut_name';

    function loadMoves() {
      const data = localStorage.getItem(LS_KEY);
      return data ? JSON.parse(data) : [];
    }

    function saveMoves(movesArray) {
      localStorage.setItem(LS_KEY, JSON.stringify(movesArray));
    }

    function appendMove(moveObj) {
      const moves = loadMoves();
      moves.push(moveObj);
      saveMoves(moves);
    }

    function deleteMovesFrom(index) {
      const moves = loadMoves();
      saveMoves(moves.slice(0, index));
    }

    function clearAllMoves() {
      localStorage.removeItem(LS_KEY);
      localStorage.removeItem(LS_NAME_KEY);
    }

    function saveDebutName(name) {
      if (name) {
        localStorage.setItem(LS_NAME_KEY, name);
      } else {
        localStorage.removeItem(LS_NAME_KEY);
      }
    }

    function loadDebutName() {
      return localStorage.getItem(LS_NAME_KEY) || '';
    }

    function applyDebutName(name) {
      const debutEl = document.getElementById('debut-name');
      debutEl.textContent = name ? ' — ' + name : '';
    }

    // ── State ─────────────────────────────────────────────────────────────────
    let board            = null;
    let game             = null;
    let savedMoves       = [];
    let currentIdx       = -1;
    let isReviewing      = false;
    let currentDebutName = '';

    // ── Helpers ───────────────────────────────────────────────────────────────
    function updateTurnIndicator() {
      const el = document.getElementById('turn-indicator');
      if (isReviewing || currentIdx < savedMoves.length - 1) {
        el.textContent = 'Режим просмотра';
        el.style.color = '#aaa';
      } else {
        el.textContent = game.turn() === 'w' ? 'Ход белых' : 'Ход чёрных';
        el.style.color = game.turn() === 'w' ? '#fff' : '#bbb';
      }
    }

    // ── Move list rendering ───────────────────────────────────────────────────
    function renderMoveList() {
      const container = document.getElementById('move-list');
      container.innerHTML = '';

      for (let i = 0; i < savedMoves.length; i += 2) {
        const whiteMove = savedMoves[i];
        const blackMove = savedMoves[i + 1];

        const row = document.createElement('div');
        row.className = 'move-row';

        const numSpan = document.createElement('span');
        numSpan.className = 'move-num';
        numSpan.textContent = whiteMove.move_number + '.';
        row.appendChild(numSpan);

        const whiteSpan = document.createElement('span');
        whiteSpan.className = 'move white';
        whiteSpan.textContent = whiteMove.move_san;
        whiteSpan.dataset.idx = i;
        if (i === currentIdx) whiteSpan.classList.add('active-move');
        whiteSpan.addEventListener('click', () => goToMove(parseInt(whiteSpan.dataset.idx)));
        row.appendChild(whiteSpan);

        const blackSpan = document.createElement('span');
        blackSpan.className = 'move black';
        if (blackMove) {
          blackSpan.textContent = blackMove.move_san;
          blackSpan.dataset.idx = i + 1;
          if (i + 1 === currentIdx) blackSpan.classList.add('active-move');
          blackSpan.addEventListener('click', () => goToMove(parseInt(blackSpan.dataset.idx)));
        }
        row.appendChild(blackSpan);

        container.appendChild(row);
      }

      const active = container.querySelector('.active-move');
      if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    // ── Navigation ────────────────────────────────────────────────────────────
    function goToMove(idx) {
      if (idx < 0 || idx >= savedMoves.length) return;
      currentIdx  = idx;
      isReviewing = true;
      const move  = savedMoves[idx];
      game.load(move.fen_after);
      board.position(move.fen_after, true);
      renderMoveList();
      updateTurnIndicator();
    }

    function goToStart() {
      currentIdx  = -1;
      isReviewing = true;
      game.reset();
      board.start(true);
      renderMoveList();
      updateTurnIndicator();
    }

    function goToEnd() {
      if (savedMoves.length === 0) return;
      currentIdx  = savedMoves.length - 1;
      isReviewing = false;
      const last  = savedMoves[currentIdx];
      game.load(last.fen_after);
      board.position(last.fen_after, true);
      renderMoveList();
      updateTurnIndicator();
    }

    // ── Undo / Redo ───────────────────────────────────────────────────────────
    function undoMove() {
      if (savedMoves.length === 0) return;

      if (!isReviewing && currentIdx === savedMoves.length - 1) {
        // Recording mode — remove last move from localStorage
        savedMoves.pop();
        deleteMovesFrom(savedMoves.length);
        currentIdx = savedMoves.length - 1;

        if (savedMoves.length === 0) {
          game.reset();
          board.start(true);
        } else {
          const prev = savedMoves[currentIdx];
          game.load(prev.fen_after);
          board.position(prev.fen_after, true);
        }
      } else {
        // Review mode — step back
        if (currentIdx <= -1) return;
        currentIdx--;
        isReviewing = true;

        if (currentIdx === -1) {
          game.reset();
          board.start(true);
        } else {
          const move = savedMoves[currentIdx];
          game.load(move.fen_after);
          board.position(move.fen_after, true);
        }
      }

      renderMoveList();
      updateTurnIndicator();
    }

    function redoMove() {
      if (!isReviewing && currentIdx === savedMoves.length - 1) return;
      if (currentIdx >= savedMoves.length - 1) {
        isReviewing = false;
        renderMoveList();
        updateTurnIndicator();
        return;
      }

      currentIdx++;
      const move = savedMoves[currentIdx];
      game.load(move.fen_after);
      board.position(move.fen_after, true);

      if (currentIdx === savedMoves.length - 1) isReviewing = false;

      renderMoveList();
      updateTurnIndicator();
    }

    // ── Step navigation (never deletes moves) ────────────────────────────────
    function stepBack() {
      if (savedMoves.length === 0 || currentIdx === -1) return;
      currentIdx--;
      isReviewing = currentIdx < savedMoves.length - 1;

      if (currentIdx === -1) {
        game.reset();
        board.start(true);
        isReviewing = true;
      } else {
        const move = savedMoves[currentIdx];
        game.load(move.fen_after);
        board.position(move.fen_after, true);
      }

      renderMoveList();
      updateTurnIndicator();
    }

    function stepForward() {
      if (currentIdx >= savedMoves.length - 1) return;
      currentIdx++;
      const move = savedMoves[currentIdx];
      game.load(move.fen_after);
      board.position(move.fen_after, true);
      isReviewing = currentIdx < savedMoves.length - 1;

      renderMoveList();
      updateTurnIndicator();
    }

    // ── chessboard.js callbacks ───────────────────────────────────────────────
    function onDragStart(source, piece) {
      if (isReviewing || currentIdx < savedMoves.length - 1) return false;
      if (game.game_over()) return false;
      if (game.turn() === 'w' && piece.startsWith('b')) return false;
      if (game.turn() === 'b' && piece.startsWith('w')) return false;
      return true;
    }

    function onDrop(source, target) {
      const fenBefore = game.fen();
      const move = game.move({ from: source, to: target, promotion: 'q' });
      if (!move) return 'snapback';

      const fenAfter   = game.fen();
      const moveNumber = Math.ceil((savedMoves.length + 1) / 2);
      const color      = move.color === 'w' ? 'white' : 'black';

      const data = {
        move_number: moveNumber,
        color:       color,
        move_san:    move.san,
        move_uci:    source + target,
        fen_before:  fenBefore,
        fen_after:   fenAfter
      };

      savedMoves.push(data);
      appendMove(data);
      currentIdx = savedMoves.length - 1;

      renderMoveList();
      updateTurnIndicator();
    }

    function onSnapEnd() {
      board.position(game.fen());
    }

    // ── Initialization ────────────────────────────────────────────────────────
    function init() {
      game = new Chess();

      const config = {
        draggable:    true,
        position:     'start',
        showNotation: true,
        pieceTheme:   'img/chesspieces/wikipedia/{piece}.png',
        onDragStart:  onDragStart,
        onDrop:       onDrop,
        onSnapEnd:    onSnapEnd
      };

      board = Chessboard('board', config);

      savedMoves = loadMoves();

      if (savedMoves.length > 0) {
        currentIdx  = savedMoves.length - 1;
        isReviewing = false;
        const last  = savedMoves[currentIdx];
        game.load(last.fen_after);
        board.position(last.fen_after, false);
      }

      // Восстановить название дебюта из localStorage
      applyDebutName(loadDebutName());

      renderMoveList();
      updateTurnIndicator();

      document.getElementById('btn-flip').addEventListener('click', () => board.flip());
      document.getElementById('btn-undo').addEventListener('click', undoMove);
      document.getElementById('btn-redo').addEventListener('click', redoMove);
      document.getElementById('btn-start').addEventListener('click', goToStart);
      document.getElementById('btn-end').addEventListener('click', goToEnd);
      document.getElementById('btn-step-back').addEventListener('click', stepBack);
      document.getElementById('btn-step-fwd').addEventListener('click', stepForward);

      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === 'ArrowLeft')  { e.preventDefault(); stepBack(); }
        if (e.key === 'ArrowRight') { e.preventDefault(); stepForward(); }
      });
      document.getElementById('btn-save-pgn').addEventListener('click', savePGN);

      document.getElementById('btn-load-pgn').addEventListener('click', () => {
        document.getElementById('pgn-file-input').click();
      });

      document.getElementById('pgn-file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        // Имя файла без расширения, декодировать как есть (браузер уже UTF-8)
        const rawName = file.name.replace(/\.pgn$/i, '');
        const reader = new FileReader();
        reader.onload = (ev) => loadPGN(ev.target.result, rawName);
        reader.readAsText(file, 'UTF-8');
        e.target.value = ''; // сброс, чтобы можно было загрузить тот же файл повторно
      });

      // ── Кнопка «домик» — список сохранённых дебютов из sd.json ─────────
      document.getElementById('btn-home').addEventListener('click', openDebutsList);
      document.getElementById('btn-modal-close').addEventListener('click', closeDebutsList);
      document.getElementById('debut-modal').addEventListener('click', (e) => {
        if (e.target.id === 'debut-modal') closeDebutsList();
      });
      document.getElementById('sd-file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        e.target.value = '';
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            renderDebutList(data);
          } catch (err) {
            renderDebutListError('Ошибка чтения sd.json: ' + err.message);
          }
        };
        reader.readAsText(file, 'UTF-8');
      });

      document.getElementById('btn-clear').addEventListener('click', () => {
        if (!confirm('Очистить всю партию?')) return;
        clearAllMoves();
        savedMoves  = [];
        currentIdx  = -1;
        isReviewing = false;
        game.reset();
        board.start(true);
        applyDebutName('');
        renderMoveList();
        updateTurnIndicator();
      });
    }

    // ── PGN Export ────────────────────────────────────────────────────────────
    function buildPGN() {
      const tempGame = new Chess();
      for (const m of savedMoves) {
        tempGame.move(m.move_san);
      }
      return tempGame.pgn();
    }

    function savePGN() {
      if (savedMoves.length === 0) { alert('Партия пуста — нечего сохранять.'); return; }
      const defaultName = currentDebutName || 'game';
      const name = prompt('Введите имя файла:', defaultName);
      if (!name) return;
      const filename = name.endsWith('.pgn') ? name : name + '.pgn';
      currentDebutName = name.replace(/\.pgn$/i, '');
      document.getElementById('debut-name').textContent = ' — ' + currentDebutName;
      const pgn = buildPGN();
      const blob = new Blob([pgn], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);

      // Сохранить и показать имя дебюта (без расширения .pgn)
      const debutName = name.replace(/\.pgn$/i, '');
      saveDebutName(debutName);
      applyDebutName(debutName);
    }

    // ── PGN Import ────────────────────────────────────────────────────────────
    function loadPGN(pgnText, debutName) {
      const tempGame = new Chess();
      const ok = tempGame.load_pgn(pgnText);
      if (!ok) { alert('Ошибка: не удалось разобрать PGN-файл.'); return; }

      // Replay all moves and collect data
      const history = tempGame.history({ verbose: true });
      clearAllMoves();
      savedMoves  = [];
      currentIdx  = -1;
      isReviewing = false;

      const replayGame = new Chess();
      for (const h of history) {
        const fenBefore = replayGame.fen();
        const move = replayGame.move({ from: h.from, to: h.to, promotion: h.promotion || 'q' });
        if (!move) break;
        const fenAfter   = replayGame.fen();
        const moveNumber = Math.ceil((savedMoves.length + 1) / 2);
        const data = {
          move_number: moveNumber,
          color:       move.color === 'w' ? 'white' : 'black',
          move_san:    move.san,
          move_uci:    h.from + h.to,
          fen_before:  fenBefore,
          fen_after:   fenAfter
        };
        savedMoves.push(data);
        appendMove(data);
      }

      if (savedMoves.length > 0) {
        currentIdx = savedMoves.length - 1;
        const last = savedMoves[currentIdx];
        game.load(last.fen_after);
        board.position(last.fen_after, true);
      } else {
        game.reset();
        board.start(true);
      }

      // Сохраняем и показываем имя дебюта в заголовке
      saveDebutName(debutName);
      applyDebutName(debutName);

      renderMoveList();
      updateTurnIndicator();
    }

    // ── Список сохранённых дебютов из sd.json ─────────────────────────────
    function openDebutsList() {
      const modal = document.getElementById('debut-modal');
      modal.classList.add('active');
      const list = document.getElementById('debut-list');
      list.innerHTML = '<li class="empty">Загрузка sd.json…</li>';

      // Пробуем fetch — работает на http(s):// и в большинстве случаев на file:// в Firefox.
      // На file:// в Chrome/Edge fetch заблокирован — тогда откроется диалог выбора файла.
      fetch('sd.json', { cache: 'no-store' })
        .then(resp => {
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          return resp.text();
        })
        .then(text => {
          try {
            const data = JSON.parse(text);
            renderDebutList(data);
          } catch (e) {
            renderDebutListError('sd.json: некорректный JSON — ' + e.message);
          }
        })
        .catch(err => {
          // Fallback: страница открыта как file:// и браузер заблокировал fetch.
          // Просим пользователя выбрать sd.json вручную.
          renderDebutListError(
            'Не удалось автоматически прочитать sd.json (' + err.message + ').<br>' +
            'Выберите файл вручную:'
          );
          const li = document.createElement('li');
          li.style.padding = '8px 18px 14px';
          const btn = document.createElement('button');
          btn.textContent = 'Выбрать sd.json';
          btn.style.cssText =
            'width:100%;padding:10px;border:1px solid #0f3460;background:#1a1a2e;' +
            'color:#e2b96f;border-radius:6px;cursor:pointer;font-size:0.9rem;';
          btn.addEventListener('click', () =>
            document.getElementById('sd-file-input').click()
          );
          li.appendChild(btn);
          li.classList.add('empty');
          li.style.cursor = 'default';
          document.getElementById('debut-list').appendChild(li);
        });
    }

    function closeDebutsList() {
      document.getElementById('debut-modal').classList.remove('active');
    }

    function renderDebutListError(msg) {
      const list = document.getElementById('debut-list');
      list.innerHTML = '';
      const li = document.createElement('li');
      li.className = 'empty';
      li.innerHTML = msg;
      list.appendChild(li);
    }

    function renderDebutList(data) {
      const list = document.getElementById('debut-list');
      list.innerHTML = '';

      const debuts = (data && Array.isArray(data.debuts)) ? data.debuts : [];
      if (debuts.length === 0) {
        renderDebutListError('Список пуст. Добавьте дебюты в sd.json.');
        return;
      }

      // Показываем только названия — без ходов.
      debuts.forEach((d, idx) => {
        const li = document.createElement('li');
        li.textContent = d.name || ('Дебют #' + (idx + 1));
        li.title = 'Загрузить на доску';
        li.addEventListener('click', () => {
          loadDebutFromList(d);
        });
        list.appendChild(li);
      });
    }

    function loadDebutFromList(debut) {
      // Поддерживаем 2 формы записи дебюта в sd.json:
      //   - "pgn":   "1. e4 c5 2. Nf3 ..."   (рекомендованная — удобно править в редакторе)
      //   - "moves": ["e4", "c5", "Nf3", ...] (массив ходов в SAN)
      let pgn = debut.pgn;
      if (!pgn && Array.isArray(debut.moves)) {
        // Преобразуем массив ходов в строку PGN.
        let out = '';
        for (let i = 0; i < debut.moves.length; i++) {
          if (i % 2 === 0) out += (i / 2 + 1) + '. ';
          out += debut.moves[i] + ' ';
        }
        pgn = out.trim();
      }
      if (!pgn) {
        alert('У дебюта «' + (debut.name || '?') + '» нет ходов (поля "pgn" или "moves").');
        return;
      }
      loadPGN(pgn, debut.name || '');
      closeDebutsList();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeDebutsList();
    });

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
